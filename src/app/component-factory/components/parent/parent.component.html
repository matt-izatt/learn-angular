<div class="component-factory-container">
    <h2>Component Factory</h2>
    <div class="parent">
        <h3>Parent Component</h3>
        <hr>
        <div class="buttons">
            <button *ngIf="placeholder" (click)="loadFirstChild()" class="btn">Load First Child</button>
            <button *ngIf="placeholder" (click)="loadSecondChild()" class="btn">Load Second Child</button>
        </div>
        <div class="content">
            <ng-template placeholder></ng-template>
        </div>
    </div>
</div>
